<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <title>Personenliste</title>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; cursor: pointer; }
    input { margin-bottom: 10px; padding: 5px; width: 200px; }
    button { margin-left: 5px; padding: 6px 10px; }
  </style>
</head>

<body>

<h2>Personenliste</h2>

<input type="text" id="search" placeholder="Suchen...">
<button id="save">💾 Speichern</button>
<button id="load">📥 Laden</button>

<table id="table"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔑 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAqb7qjv7eTSZbKH-0-H_rKvywlSYo43xc",
  authDomain: "learning-coding-acff0.firebaseapp.com",
  projectId: "learning-coding-acff0",
  storageBucket: "learning-coding-acff0.firebasestorage.app",
  messagingSenderId: "437889225622",
  appId: "1:437889225622:web:29f7c93bdf0d7be85403b7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔗 CSV URL
const csvUrl = "https://raw.githubusercontent.com/DarioLorenzon/Learning_Coding/main/personen.csv";

// 🔥 FIX: feste Spaltenreihenfolge
const columns = ["Name", "Vorname", "Geschlecht", "Alter", "Email", "Tel"];

let originalData = [];
let currentData = [];
let sortDirection = 1;

// CSV laden
Papa.parse(csvUrl, {
  download: true,
  header: true,
  complete: function(results) {
    originalData = results.data.filter(row => row.Name);
    currentData = [...originalData];
    createTable(currentData);
  }
});

// Tabelle erstellen
function createTable(data) {
  const table = document.getElementById("table");
  table.innerHTML = "";

  if (!data || data.length === 0) return;

  // Header
  const headerRow = document.createElement("tr");

  columns.forEach(key => {
    const th = document.createElement("th");
    th.textContent = key;
    th.addEventListener("click", () => sortTable(key));
    headerRow.appendChild(th);
  });

  table.appendChild(headerRow);

  // Rows
  data.forEach(row => {
    const tr = document.createElement("tr");

    columns.forEach(key => {
      const td = document.createElement("td");
      td.textContent = row[key] || "";

      td.contentEditable = true;

      td.addEventListener("input", () => {
        row[key] = td.textContent;
      });

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}

// Suche
document.getElementById("search").addEventListener("input", function(e) {
  const value = e.target.value.toLowerCase();

  currentData = originalData.filter(row =>
    columns.some(col =>
      String(row[col] || "").toLowerCase().includes(value)
    )
  );

  createTable(currentData);
});

// Sortieren
function sortTable(column) {
  currentData.sort((a, b) => {
    if (a[column] < b[column]) return -1 * sortDirection;
    if (a[column] > b[column]) return 1 * sortDirection;
    return 0;
  });

  sortDirection *= -1;
  createTable(currentData);
}

// 💾 Speichern
document.getElementById("save").addEventListener("click", async () => {
  try {
    await addDoc(collection(db, "personen"), {
      created: Date.now(),
      data: currentData
    });

    alert("Gespeichert!");
  } catch (e) {
    console.error(e);
    alert("Fehler beim Speichern");
  }
});

// 📥 Laden
document.getElementById("load").addEventListener("click", async () => {
  try {
    const querySnapshot = await getDocs(collection(db, "personen"));

    if (querySnapshot.empty) {
      alert("Keine Daten gefunden");
      return;
    }

    let latestDoc = null;
    let latestTime = 0;

    querySnapshot.forEach(doc => {
      const d = doc.data();

      if (d.created > latestTime) {
        latestTime = d.created;
        latestDoc = d;
      }
    });

    if (!latestDoc) {
      alert("Keine gültigen Daten");
      return;
    }

    const loadedData = latestDoc.data;

    originalData = loadedData;
    currentData = [...loadedData];

    createTable(currentData);

    alert("Daten geladen!");
  } catch (e) {
    console.error(e);
    alert("Fehler beim Laden");
  }
});

</script>

</body>
</html>
