<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <title>CSV Anzeige</title>

  <!-- PapaParse (CSV Parser) -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>

<body>

<h2>Personenliste</h2>
  
    <input type="text" id="search" placeholder="Suchen..." 
    style="margin-bottom:10px; padding:5px; width:200px;">
 
<table id="table"></table>

<script>
const csvUrl = "https://raw.githubusercontent.com/DarioLorenzon/Learning_Coding/main/personen.csv";

let originalData = [];
let currentData = [];

Papa.parse(csvUrl, {
  download: true,
  header: true,
  complete: function(results) {
    originalData = results.data.filter(row => row.Name);
    currentData = [...originalData];
    createTable(currentData);
  }
});

// Tabelle erstellen
function createTable(data) {
  const table = document.getElementById("table");
  table.innerHTML = "";

  // Header
  const headerRow = document.createElement("tr");

  Object.keys(data[0]).forEach(key => {
    const th = document.createElement("th");
    th.textContent = key;

    // 🔥 Sortieren beim Klick
    th.addEventListener("click", () => sortTable(key));

    headerRow.appendChild(th);
  });

  table.appendChild(headerRow);

  // Rows
  data.forEach(row => {
  const tr = document.createElement("tr");

  const keys = Object.keys(row);

  keys.forEach((key, index) => {
    const td = document.createElement("td");
    td.textContent = row[key];

    // editierbar
    td.contentEditable = true;

    // Änderung speichern
    td.addEventListener("input", () => {
      row[key] = td.textContent;
    });

    tr.appendChild(td);
  });

  table.appendChild(tr);
});

  

// 🔍 Suche
document.getElementById("search").addEventListener("input", function(e) {
  const value = e.target.value.toLowerCase();

  currentData = originalData.filter(row =>
    Object.values(row).some(val =>
      String(val).toLowerCase().includes(value)
    )
  );

  createTable(currentData);
});

// 🔃 Sortieren
let sortDirection = 1;

function sortTable(column) {
  currentData.sort((a, b) => {
    if (a[column] < b[column]) return -1 * sortDirection;
    if (a[column] > b[column]) return 1 * sortDirection;
    return 0;
  });

  sortDirection *= -1;
  createTable(currentData);
}
</script>
  
</body>
</html>
